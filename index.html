<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Component Explorer</title>
    <style>
        :root {
            --brand-cyan: #00e5ff;
            --brand-light-blue: #1a2a40; /* Lighter background variable */
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.2);
        }
        
        body { margin: 0; overflow: hidden; background: var(--brand-light-blue); font-family: 'Inter', sans-serif; }
        
        #instruction-panel {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffffff;
            pointer-events: none;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 15px 40px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            display: flex;
            gap: 30px;
            z-index: 100;
        }
