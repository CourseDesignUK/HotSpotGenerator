<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis Assistant v1.0</title>
    <style>
        :root {
            --bg: #050505;
            --panel: #111111;
            --accent-standby: #0070f3;
            --accent-active: #00ff88;
            --accent-listen: #f5a623;
            --text-main: #ffffff;
            --text-dim: #888888;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #assistant-card {
            width: 400px;
            background: var(--panel);
            padding: 2.5rem;
            border-radius: 20px;
            border: 1px solid #222;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
            text-align: center;
        }

        .status-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 2rem;
        }

        #status-orb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--accent-standby);
            box-shadow: 0 0 15px var(--accent-standby);
            transition: all 0.3s ease;
        }

        #status-text {
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        #display-log {
            background: #000;
            padding: 1.5rem;
            border-radius: 12px;
            min-height: 80px;
            font-family: 'Consolas', monospace;
            font-size: 0.9rem;
            color: var(--accent-active);
            text-align: left;
            border: 1px solid #111;
            overflow-y: auto;
            max-height: 150px;
        }

        .history-tag {
            display: block;
            font-size: 0.65rem;
            color: #444;
            margin-top: 10px;
            border-top: 1px solid #111;
            padding-top: 5px;
        }
    </style>
</head>
<body>

<div id="assistant-card">
    <div class="status-container">
        <div id="status-orb"></div>
        <span id="status-text">System Standby</span>
    </div>
    
    <div id="display-log">Initialize...</div>
    
    <div class="history-tag">Wake Word: "Jarvis"</div>
</div>

<script>
    const statusOrb = document.getElementById('status-orb');
    const statusText = document.getElementById('status-text');
    const displayLog = document.getElementById('display-log');

    const WAKE_WORD = "jarvis";
    let isListeningForCommand = false;
    let silenceTimer;

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();

    recognition.continuous = true;
    recognition.interimResults = false;
    recognition.lang = 'en-US';

    recognition.onstart = () => {
        updateUI('standby');
        displayLog.textContent = "Awaiting wake word...";
    };

    recognition.onresult = (event) => {
        const transcript = event.results[event.results.length - 1][0].transcript.trim().toLowerCase();
        
        if (!isListeningForCommand) {
            if (transcript.includes(WAKE_WORD)) {
                activateCommandMode();
            }
        } else {
            clearTimeout(silenceTimer);
            handleInput(transcript);
        }
    };

    recognition.onerror = () => {
        setTimeout(() => recognition.start(), 1000);
    };

    recognition.onend = () => {
        recognition.start();
    };

    function updateUI(state) {
        if (state === 'standby') {
            statusOrb.style.background = 'var(--accent-standby)';
            statusOrb.style.boxShadow = '0 0 15px var(--accent-standby)';
            statusText.textContent = "System Standby";
        } else if (state === 'listening') {
            statusOrb.style.background = 'var(--accent-listen)';
            statusOrb.style.boxShadow = '0 0 15px var(--accent-listen)';
            statusText.textContent = "Listening...";
        }
    }

    function activateCommandMode() {
        isListeningForCommand = true;
        updateUI('listening');
        displayLog.textContent = "> Jarvis: Ready.";
        speak("How can I help?");
        
        // Auto-close if no command follows within 5 seconds
        silenceTimer = setTimeout(resetToStandby, 5000);
    }

    async function handleInput(cmd) {
        displayLog.textContent = `> ${cmd}`;
        
        if (cmd.includes('weather')) {
            await getWeather();
        } else if (cmd.includes('time')) {
            speak(`Current time is ${new Date().toLocaleTimeString()}`);
        } else if (cmd.includes('date')) {
            speak(`Today is ${new Date().toDateString()}`);
        } else if (cmd.includes('clear')) {
            displayLog.textContent = "_";
            speak("Display cleared.");
        } else {
            speak("Command processed.");
        }

        // 2 second pause logic after response
        setTimeout(resetToStandby, 2000);
    }

    async function getWeather() {
        try {
            // Static coordinates (London) - Use navigator.geolocation for dynamic
            const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=51.5074&longitude=-0.1278&current_weather=true`);
            const data = await res.json();
            const temp = Math.round(data.current_weather.temperature);
            const report = `The weather is currently ${temp} degrees Celsius in London.`;
            displayLog.textContent = `> ${report}`;
            speak(report);
        } catch (e) {
            speak("Weather service unavailable.");
        }
    }

    function resetToStandby() {
        isListeningForCommand = false;
        updateUI('standby');
        displayLog.textContent = "Awaiting wake word...";
    }

    function speak(text) {
        const synth = window.speechSynthesis;
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.pitch = 0.9;
        utterance.rate = 1.0;
        synth.speak(utterance);
    }

    // Start recognition
    recognition.start();
</script>

</body>
</html>
