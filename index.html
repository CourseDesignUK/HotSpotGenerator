    [,] ASSEMBLE<br>
    [,] ASSEMBLE<br>
    MOUSE OVER TO IDENTIFY
</div>
<div id="label"></div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.01, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const label = document.getElementById('label');

    const ambientLight = new THREE.AmbientLight(0xffffff, 1);
    scene.add(ambientLight);
    const directionalLight = new THREE.DirectionalLight(0xffffff, 2);
    directionalLight.position.set(5, 5, 5);
    scene.add(directionalLight);

    let components = [];
    let explodeFactor = 0;

    const loader = new GLTFLoader();
    // Path relative to the current environment
    loader.load('90l_fire_extinguisher.glb', (gltf) => {
        const model = gltf.scene;
        
        // Center model
        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        model.position.sub(center);

        model.traverse((child) => {
            if (child.isMesh) {
                // Store world position for explosion vector calculation
                const worldPos = new THREE.Vector3();
                child.getWorldPosition(worldPos);
                
                child.userData.originalPos = child.position.clone();
                // Explosion vector is direction from model center (0,0,0) to part center
                child.userData.explodeVec = worldPos.clone().normalize();
                
                components.push(child);
            }
        });

        scene.add(model);
        camera.position.set(0, 0.2, 0.8);
    }, undefined, (error) => {
        console.error('Error loading model:', error);
    });

    window.addEventListener('keydown', (e) => {
        if (e.key === '.') explodeFactor += 0.05;
        if (e.key === ',') explodeFactor = Math.max(0, explodeFactor - 0.05);
    });

    window.addEventListener('mousemove', (e) => {
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    });

    function animate() {
        requestAnimationFrame(animate);

        components.forEach(mesh => {
            const shift = mesh.userData.explodeVec.clone().multiplyScalar(explodeFactor);
            mesh.position.copy(mesh.userData.originalPos).add(shift);
        });

        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(components);

        if (intersects.length > 0) {
            const target = intersects[0].object;
            label.style.display = 'block';
            label.innerText = target.name || "Unnamed Component";
            
            components.forEach(m => m.material.emissive?.setHex(0x000000));
            if(target.material.emissive) target.material.emissive.setHex(0x222222);
        } else {
            label.style.display = 'none';
            components.forEach(m => m.material.emissive?.setHex(0x000000));
        }

        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
</body>
</html>
