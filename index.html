<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Model Exploder</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: monospace; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            pointer-events: none;
            background: rgba(0,0,0,0.5);
            padding: 10px;
        }
        #label {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: #00ff00;
            font-size: 1.2rem;
            background: rgba(0,0,0,0.8);
            padding: 8px 16px;
            border: 1px solid #00ff00;
            display: none;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="ui">
    [.] PULL APART<br>
    [,] ASSEMBLE<br>
    MOUSE OVER TO IDENTIFY
</div>
<div id="label"></div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.01, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const label = document.getElementById('label');

    const ambientLight = new THREE.AmbientLight(0xffffff, 1);
    scene.add(ambientLight);
    const directionalLight = new THREE.DirectionalLight(0xffffff, 2);
    directionalLight.position.set(5, 5, 5);
    scene.add(directionalLight);

    let components = [];
    let explodeFactor = 0;

    const loader = new GLTFLoader();
    // Path relative to the current environment
    loader.load('90l_fire_extinguisher.glb', (gltf) => {
        const model = gltf.scene;
        
        // Center model
        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        model.position.sub(center);

        model.traverse((child) => {
            if (child.isMesh) {
                // Store world position for explosion vector calculation
                const worldPos = new THREE.Vector3();
                child.getWorldPosition(worldPos);
                
                child.userData.originalPos = child.position.clone();
                // Explosion vector is direction from model center (0,0,0) to part center
                child.userData.explodeVec = worldPos.clone().normalize();
                
                components.push(child);
            }
        });

        scene.add(model);
        camera.position.set(0, 0.2, 0.8);
    }, undefined, (error) => {
        console.error('Error loading model:', error);
    });

    window.addEventListener('keydown', (e) => {
        if (e.key === '.') explodeFactor += 0.05;
        if (e.key === ',') explodeFactor = Math.max(0, explodeFactor - 0.05);
    });

    window.addEventListener('mousemove', (e) => {
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    });

    function animate() {
        requestAnimationFrame(animate);

        components.forEach(mesh => {
            const shift = mesh.userData.explodeVec.clone().multiplyScalar(explodeFactor);
            mesh.position.copy(mesh.userData.originalPos).add(shift);
        });

        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(components);

        if (intersects.length > 0) {
            const target = intersects[0].object;
            label.style.display = 'block';
            label.innerText = target.name || "Unnamed Component";
            
            components.forEach(m => m.material.emissive?.setHex(0x000000));
            if(target.material.emissive) target.material.emissive.setHex(0x222222);
        } else {
            label.style.display = 'none';
            components.forEach(m => m.material.emissive?.setHex(0x000000));
        }

        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
</body>
</html>
