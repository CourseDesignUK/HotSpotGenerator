<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Assistant Loader</title>
    <style>
        body { margin: 0; background: #050505; color: #fff; font-family: monospace; overflow: hidden; }
        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(15, 15, 15, 0.8);
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid #333;
            width: 300px;
        }
        #canvas-container { width: 100vw; height: 100vh; }
        .input-group { display: flex; gap: 5px; margin-top: 10px; }
        input { background: #000; border: 1px solid #444; color: #0f0; padding: 8px; flex-grow: 1; }
        button { background: #0070f3; color: #fff; border: none; padding: 8px 12px; cursor: pointer; }
        #status { font-size: 0.7rem; color: #888; margin-bottom: 5px; }
    </style>
</head>
<body>

<div id="ui-overlay">
    <div id="status">3D RENDER ENGINE OFFLINE</div>
    <div id="log">Enter .glb filename from /models/</div>
    <div class="input-group">
        <input type="text" id="model-name" placeholder="model.glb" value="assistant.glb">
        <button id="load-btn">Render</button>
    </div>
</div>

<div id="canvas-container"></div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let scene, camera, renderer, controls, currentModel;

    function initScene() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1, 3);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const light = new THREE.AmbientLight(0xffffff, 2);
        scene.add(light);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 5, 5);
        scene.add(dirLight);

        controls = new OrbitControls(camera, renderer.domElement);
        animate();
    }

    async function loadModel(fileName) {
        if (currentModel) scene.remove(currentModel);
        
        const loader = new GLTFLoader();
        const status = document.getElementById('status');
        const log = document.getElementById('log');

        status.textContent = "LOADING...";
        
        loader.load(
            `./models/${fileName}`,
            (gltf) => {
                currentModel = gltf.scene;
                scene.add(currentModel);
                
                // Center model
                const box = new THREE.Box3().setFromObject(currentModel);
                const center = box.getCenter(new THREE.Vector3());
                currentModel.position.sub(center);

                status.textContent = "ENGINE ACTIVE";
                log.textContent = `Loaded: ${fileName}`;
            },
            (xhr) => {
                const percent = Math.round((xhr.loaded / xhr.total) * 100);
                log.textContent = `Downloading: ${percent}%`;
            },
            (error) => {
                status.textContent = "LOAD ERROR";
                log.textContent = "File not found in /models/";
                console.error(error);
            }
        );
    }

    function animate() {
        requestAnimationFrame(animate);
        if (currentModel) currentModel.rotation.y += 0.005;
        controls.update();
        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    document.getElementById('load-btn').addEventListener('click', () => {
        const file = document.getElementById('model-name').value;
        loadModel(file);
    });

    initScene();
</script>
</body>
</html>
