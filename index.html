<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ATTP | Persistent Wildfire</title>
    
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script>
        // Custom Component: Lock to World
        AFRAME.registerComponent('lock-to-world', {
            init: function () {
                const el = this.el;
                const marker = document.querySelector('#marker-hiro');
                const scene = this.el.sceneEl;

                marker.addEventListener('markerFound', () => {
                    // Update UI status
                    document.getElementById('tracking-status').innerText = "LOCK ACQUIRED";
                    document.getElementById('status-dot').style.background = "#00ff00";
                    
                    // Show the model
                    el.setAttribute('visible', 'true');
                });

                marker.addEventListener('markerLost', () => {
                    // Get current world position/rotation before marker is lost
                    const worldPos = new THREE.Vector3();
                    const worldRot = new THREE.Quaternion();
                    const worldScale = new THREE.Vector3();
                    
                    el.object3D.getWorldPosition(worldPos);
                    el.object3D.getWorldQuaternion(worldRot);
                    el.object3D.getWorldScale(worldScale);

                    // Re-parent to scene so it doesn't disappear with the marker
                    scene.object3D.add(el.object3D);

                    // Re-apply the world coordinates
                    el.object3D.position.copy(worldPos);
                    el.object3D.quaternion.copy(worldRot);
                    el.object3D.scale.copy(worldScale);

                    document.getElementById('tracking-status').innerText = "MARKER LOST - INTERPOSITION ACTIVE";
                    document.getElementById('status-dot').style.background = "#ffae00";
                });
            }
        });
    </script>

    <style>
        :root { --attp-blue: #00d2ff; --dark-glass: rgba(10, 14, 20, 0.9); }
        body { margin: 0; overflow: hidden; font-family: 'Consolas', monospace; }

        .hud-overlay {
            position: absolute; bottom: 40px; left: 20px;
            background: var(--dark-glass); border-left: 4px solid var(--attp-blue);
            padding: 15px; z-index: 100; border-radius: 0 4px 4px 0;
            width: 280px; backdrop-filter: blur(8px);
        }

        #status-dot {
            display: inline-block; width: 10px; height: 10px;
            background: #ff3e3e; border-radius: 50%; margin-right: 10px;
        }

        .label { font-size: 10px; color: #888; text-transform: uppercase; }
        .value { font-size: 14px; color: white; display: block; margin-top: 4px; }
    </style>
</head>

<body>
    <div class="hud-overlay">
        <div class="label"><span id="status-dot"></span>System Status</div>
        <div id="tracking-status" class="value">SCANNING FOR HIRO MARKER...</div>
    </div>

    <a-scene embedded vr-mode-ui="enabled: false" arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-assets>
            <a-asset-item id="wildfire" src="https://raw.githack.com/KhronosGroup/glTF-Sample-Models/master/2.0/Lantern/glTF-Binary/Lantern.glb"></a-asset-item>
        </a-assets>

        <a-marker preset="hiro" id="marker-hiro">
            <a-entity id="anchor"></a-entity>
        </a-marker>

        <a-entity 
            id="wildfire-model"
            gltf-model="#wildfire" 
            scale="0.1 0.1 0.1" 
            visible="false"
            lock-to-world>
        </a-entity>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
