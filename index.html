<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Exploded View Controller</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: monospace; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ff00;
            pointer-events: none;
            text-transform: uppercase;
        }
        #label {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffffff;
            font-size: 1.5rem;
            background: rgba(0,0,0,0.8);
            padding: 10px 20px;
            border: 1px solid #444;
            display: none;
        }
    </style>
</head>
<body>

<div id="ui">
    [.] - Explode Components<br>
    [,] - Reassemble Components<br>
    [Mouse Over] - Identify Parts
</div>
<div id="label"></div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';

    // Initialization
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const label = document.getElementById('label');

    // Lighting
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);
    const pointLight = new THREE.PointLight(0xffffff, 1);
    pointLight.position.set(10, 10, 10);
    scene.add(pointLight);

    // Model Construction (Component Group)
    const modelGroup = new THREE.Group();
    const components = [];

    const partData = [
        { name: "Core Module", color: 0xff0000, pos: [0, 0, 0], dim: [1, 1, 1] },
        { name: "Left Wing", color: 0x00ff00, pos: [-1.5, 0, 0], dim: [2, 0.2, 1] },
        { name: "Right Wing", color: 0x00ff00, pos: [1.5, 0, 0], dim: [2, 0.2, 1] },
        { name: "Top Sensor", color: 0x0000ff, pos: [0, 1, 0], dim: [0.5, 0.5, 0.5] },
        { name: "Front Lens", color: 0xffff00, pos: [0, 0, 1], dim: [0.8, 0.8, 0.2] }
    ];

    partData.forEach(data => {
        const geometry = new THREE.BoxGeometry(...data.dim);
        const material = new THREE.MeshStandardMaterial({ color: data.color });
        const mesh = new THREE.Mesh(geometry, material);
        
        mesh.userData.name = data.name;
        mesh.userData.originalPos = new THREE.Vector3(...data.pos);
        mesh.position.set(...data.pos);
        
        components.push(mesh);
        modelGroup.add(mesh);
    });

    scene.add(modelGroup);
    camera.position.z = 8;

    // Explosion Logic
    let explodeFactor = 0;
    const explodeSpeed = 0.05;

    window.addEventListener('keydown', (e) => {
        if (e.key === '.') explodeFactor += explodeSpeed;
        if (e.key === ',') explodeFactor = Math.max(0, explodeFactor - explodeSpeed);
    });

    window.addEventListener('mousemove', (e) => {
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    });

    function animate() {
        requestAnimationFrame(animate);

        // Update Component Positions
        components.forEach(mesh => {
            const offset = mesh.userData.originalPos.clone().multiplyScalar(explodeFactor);
            mesh.position.copy(mesh.userData.originalPos).add(offset);
        });

        // Raycasting for Identification
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(components);

        if (intersects.length > 0) {
            label.style.display = 'block';
            label.innerText = intersects[0].object.userData.name;
            intersects[0].object.material.emissive.setHex(0x333333);
        } else {
            label.style.display = 'none';
            components.forEach(m => m.material.emissive.setHex(0x000000));
        }

        modelGroup.rotation.y += 0.005;
        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
</body>
</html>
