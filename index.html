<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Assistant Interface</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --accent-color: #38bdf8;
        }
        body {
            font-family: sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        #app-container {
            width: 90%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        #status {
            margin-bottom: 1rem;
            font-size: 0.875rem;
            color: var(--accent-color);
        }
        #transcript {
            min-height: 100px;
            margin: 1rem 0;
            padding: 1rem;
            background: rgba(0,0,0,0.2);
            border-radius: 0.5rem;
            text-align: left;
            font-size: 1rem;
        }
        button {
            background-color: var(--accent-color);
            border: none;
            padding: 1rem 2rem;
            border-radius: 9999px;
            color: var(--bg-color);
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div id-="app-container">
    <div id="status">System Ready</div>
    <div id="transcript">Voice input will appear here...</div>
    <button id="mic-btn">Start Listening</button>
</div>

<script>
    const micBtn = document.getElementById('mic-btn');
    const transcriptDiv = document.getElementById('transcript');
    const statusDiv = document.getElementById('status');

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    
    if (!SpeechRecognition) {
        statusDiv.textContent = "Speech Recognition not supported in this browser.";
        micBtn.disabled = true;
    } else {
        const recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.lang = 'en-US';

        recognition.onstart = () => {
            statusDiv.textContent = "Listening...";
            micBtn.textContent = "Stop";
        };

        recognition.onresult = (event) => {
            const text = event.results[0][0].transcript;
            transcriptDiv.textContent = text;
            processCommand(text.toLowerCase());
        };

        recognition.onend = () => {
            statusDiv.textContent = "System Ready";
            micBtn.textContent = "Start Listening";
        };

        micBtn.addEventListener('click', () => {
            recognition.start();
        });
    }

    function processCommand(command) {
        const msg = new SpeechSynthesisUtterance();
        
        if (command.includes('time')) {
            const time = new Date().toLocaleTimeString();
            msg.text = `The time is ${time}`;
        } else if (command.includes('date')) {
            const date = new Date().toDateString();
            msg.text = `Today is ${date}`;
        } else if (command.includes('hello')) {
            msg.text = "System online. Awaiting instruction.";
        } else {
            msg.text = "Command recognized, but no logic assigned.";
        }

        window.speechSynthesis.speak(msg);
    }
</script>

</body>
</html>
