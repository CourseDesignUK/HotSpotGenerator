<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Component Explorer | Explode Mode</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        :root {
            --brand-cyan: #00e5ff;
            --brand-bg: #0a111a;
            --glass-bg: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-main: #ffffff;
            --font-stack: 'Inter', sans-serif;
        }
        
        body { margin: 0; overflow: hidden; background: var(--brand-bg); font-family: var(--font-stack); height: 100vh; }

        model-viewer { width: 100%; height: 100%; }
        
        #instruction-panel {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            color: var(--text-main); background: var(--glass-bg); backdrop-filter: blur(20px);
            padding: 12px 24px; border-radius: 50px; border: 1px solid var(--glass-border);
            display: flex; align-items: center; gap: 20px; z-index: 100;
        }

        .key-hint {
            font-size: 10px; background: rgba(255,255,255,0.1);
            padding: 4px 8px; border-radius: 4px; border: 1px solid var(--brand-cyan);
            color: var(--brand-cyan); font-weight: bold;
        }

        .control-group { display: flex; align-items: center; gap: 10px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
        select { appearance: none; background: rgba(255, 255, 255, 0.1); color: var(--brand-cyan); border: 1px solid var(--glass-border); padding: 6px 12px; border-radius: 6px; cursor: pointer; }
        .divider { width: 1px; height: 20px; background: var(--glass-border); }
    </style>
</head>
<body>

    <div id="instruction-panel">
        <div class="control-group">
            <label>MODEL</label>
            <select id="model-select">
                <option value="models/90LFE2.glb">90L Component</option>
                <option value="models/Water FAFA.glb">Water System</option>
            </select>
        </div>
        <div class="divider"></div>
        <div class="control-group">
            <span class="key-hint">,</span> EXPLODE
        </div>
        <div class="control-group">
            <span class="key-hint">.</span> ASSEMBLE
        </div>
    </div>

    <model-viewer 
        id="viewer" 
        src="models/90LFE2.glb" 
        camera-controls 
        shadow-intensity="1" 
        environment-image="neutral">
    </model-viewer>

    <script type="module">
        const viewer = document.querySelector('#viewer');
        let explosionFactor = 0;
        const step = 0.05; // Speed of movement

        // This function targets the internal Three.js scene within model-viewer
        const updateExplosion = () => {
            const scene = viewer.toObject3D(); // Access the underlying 3D scene
            if (!scene) return;

            scene.traverse((obj) => {
                if (obj.isMesh) {
                    // Store the original position if we haven't yet
                    if (!obj.userData.origPos) {
                        obj.userData.origPos = obj.position.clone();
                        // Calculate direction vector from center of the model
                        obj.userData.direction = obj.position.clone().normalize();
                    }

                    // Calculate new position based on explosion factor
                    // We multiply the direction by our explosion factor
                    const displacement = obj.userData.direction.clone().multiplyScalar(explosionFactor * 2);
                    obj.position.copy(obj.userData.origPos).add(displacement);
                }
            });
        };

        // Handle Keyboard Input
        window.addEventListener('keydown', (e) => {
            if (e.key === ',') { // Explode
                explosionFactor = Math.min(explosionFactor + step, 5);
                updateExplosion();
            }
            if (e.key === '.') { // Reassemble
                explosionFactor = Math.max(explosionFactor - step, 0);
                updateExplosion();
            }
        });

        // Reset positions when switching models
        document.getElementById('model-select').addEventListener('change', (e) => {
            viewer.src = e.target.value;
            explosionFactor = 0; // Reset explosion state
        });
    </script>
</body>
</html>
